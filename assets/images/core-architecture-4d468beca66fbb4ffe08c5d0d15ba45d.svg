  <text x="640.0" y="318" text-anchor="middle" class="node-desc" font-size="10.5" fill="#475569">调度算法 + 并发执行器</text>
  <rect x="780" y="278" width="200" height="58" rx="6" ry="6" fill="#ffffff" stroke="#f97316" stroke-width="1.6"/>
  <text x="880.0" y="300" text-anchor="middle" class="node-title" font-size="13" fill="#9a3412">_read.py / _write.py</text>
  <text x="880.0" y="318" text-anchor="middle" class="node-desc" font-size="10.5" fill="#475569">通道 IO (Channel read/write)</text>
