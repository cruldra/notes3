  <text x="815.0" y="122" text-anchor="middle" class="node-title" font-size="14" fill="#5b21b6">types / typing / errors / constants / runtime</text>
  <text x="815.0" y="138" text-anchor="middle" class="node-sub" font-size="11" fill="#64748b">公开类型 &amp; 入口</text>
  <text x="815.0" y="156" text-anchor="middle" class="node-desc" font-size="11.5" fill="#334155">Runtime · RunnableConfig · RetryPolicy · CachePolicy</text>
  <text x="815.0" y="170" text-anchor="middle" class="node-desc" font-size="11.5" fill="#334155">StreamMode · Send · Interrupt · START / END</text>
  <text x="815.0" y="184" text-anchor="middle" class="node-desc" font-size="11.5" fill="#334155">GraphRecursionError · InvalidUpdateError …</text>
  <text x="30" y="325" class="layer-tag" font-size="11" fill="#94a3b8" transform="rotate(-90,30,325)">② 执行引擎</text>
