  <text x="200.0" y="506" text-anchor="middle" class="node-desc" font-size="11.5" fill="#334155">LastValue / LastValueAfterFinish</text>
  <text x="200.0" y="520" text-anchor="middle" class="node-desc" font-size="11.5" fill="#334155">Topic · BinaryOperatorAggregate</text>
  <text x="200.0" y="534" text-anchor="middle" class="node-desc" font-size="11.5" fill="#334155">NamedBarrierValue / Ephemeral</text>
  <text x="200.0" y="548" text-anchor="middle" class="node-desc" font-size="11.5" fill="#334155">AnyValue · UntrackedValue</text>
  <text x="200.0" y="562" text-anchor="middle" class="node-desc" font-size="11.5" fill="#334155">→ 定义 state 合并语义</text>
  <rect x="370" y="450" width="230" height="140" rx="10" ry="10" fill="#dcfce7" stroke="#10b981" stroke-width="1.6" filter="url(#shadow)"/>
  <text x="485.0" y="472" text-anchor="middle" class="node-title" font-size="14" fill="#065f46">managed/</text>
  <text x="485.0" y="488" text-anchor="middle" class="node-sub" font-size="11" fill="#64748b">Runtime 注入值</text>
  <text x="485.0" y="506" text-anchor="middle" class="node-desc" font-size="11.5" fill="#334155">IsLastStep</text>
  <text x="485.0" y="520" text-anchor="middle" class="node-desc" font-size="11.5" fill="#334155">RemainingSteps</text>
  <text x="485.0" y="534" text-anchor="middle" class="node-desc" font-size="11.5" fill="#334155"></text>
  <text x="485.0" y="548" text-anchor="middle" class="node-desc" font-size="11.5" fill="#334155">→ 由调度器自动计算</text>
  <text x="485.0" y="562" text-anchor="middle" class="node-desc" font-size="11.5" fill="#334155">   不由用户写入</text>
  <rect x="630" y="450" width="360" height="140" rx="10" ry="10" fill="#f3f4f6" stroke="#6b7280" stroke-width="1.6" stroke-dasharray="6,4"/>
  <text x="810.0" y="472" text-anchor="middle" class="node-title" font-size="14" fill="#374151">_internal/</text>
  <text x="810.0" y="488" text-anchor="middle" class="node-sub" font-size="11" fill="#64748b">严格私有实现</text>
  <text x="810.0" y="506" text-anchor="middle" class="node-desc" font-size="11.5" fill="#334155">_runnable · _serde · _config</text>
  <text x="810.0" y="520" text-anchor="middle" class="node-desc" font-size="11.5" fill="#334155">_retry · _cache · _pydantic</text>
  <text x="810.0" y="534" text-anchor="middle" class="node-desc" font-size="11.5" fill="#334155">_queue · _future · _replay</text>
  <text x="810.0" y="548" text-anchor="middle" class="node-desc" font-size="11.5" fill="#334155">_typing · _fields · _scratchpad</text>
  <text x="810.0" y="562" text-anchor="middle" class="node-desc" font-size="11.5" fill="#334155">→ 绝不对外导出</text>
