  <rect width="1200" height="740" fill="#ffffff"/>
  <text x="600" y="38" text-anchor="middle" class="title" font-size="20" fill="#0f172a">LangGraph Core · 内部架构 (libs/langgraph)</text>
  <text x="600" y="62" text-anchor="middle" class="subtitle" font-size="12" fill="#475569">用户 API → Pregel 引擎 → 状态通道与支撑 · 右侧为跨库外部依赖</text>
  <text x="30" y="150" class="layer-tag" font-size="11" fill="#94a3b8" transform="rotate(-90,30,150)">① 用户 API</text>
  <rect x="60" y="100" width="260" height="100" rx="10" ry="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.6" filter="url(#shadow)"/>
  <text x="190.0" y="122" text-anchor="middle" class="node-title" font-size="14" fill="#5b21b6">graph/</text>
  <text x="190.0" y="138" text-anchor="middle" class="node-sub" font-size="11" fill="#64748b">声明式图 API</text>
  <text x="190.0" y="156" text-anchor="middle" class="node-desc" font-size="11.5" fill="#334155">StateGraph · MessageGraph</text>
  <text x="190.0" y="170" text-anchor="middle" class="node-desc" font-size="11.5" fill="#334155">add_messages · START / END</text>
  <text x="190.0" y="184" text-anchor="middle" class="node-desc" font-size="11.5" fill="#334155">条件边 · 子图 · 编译</text>
  <rect x="350" y="100" width="260" height="100" rx="10" ry="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.6" filter="url(#shadow)"/>
  <text x="480.0" y="122" text-anchor="middle" class="node-title" font-size="14" fill="#5b21b6">func/</text>
  <text x="480.0" y="138" text-anchor="middle" class="node-sub" font-size="11" fill="#64748b">函数式装饰器 API</text>
  <text x="480.0" y="156" text-anchor="middle" class="node-desc" font-size="11.5" fill="#334155">@task · @entrypoint</text>
  <text x="480.0" y="170" text-anchor="middle" class="node-desc" font-size="11.5" fill="#334155">无需画图直接写函数</text>
  <text x="480.0" y="184" text-anchor="middle" class="node-desc" font-size="11.5" fill="#334155">内部自动编译为 Pregel</text>
